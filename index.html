<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arxiv Paper Reader · 论文深度解读合集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=STIX+Two+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{--bg:#fff;--text:#222;--muted:#666;--line:#d8d8d8;--soft:#f6f6f6}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:15px/1.8 'STIX Two Text','Noto Serif SC','Times New Roman',serif}
.wrap{max-width:880px;margin:0 auto;padding:56px 32px 120px}
header{border-bottom:2px solid #000;padding-bottom:18px;margin-bottom:22px}
h1{font-size:30px;margin:0 0 6px;color:#000;letter-spacing:.5px}
.tagline{font-size:13.5px;color:var(--muted);margin:0}
.meta{font-size:12px;color:var(--muted);margin-top:10px}
.meta a{color:#444}

/* 工具条 */
.toolbar{position:sticky;top:0;background:var(--bg);padding:14px 0 12px;margin-bottom:8px;border-bottom:1px solid var(--line);z-index:5}
.searchbox{position:relative;margin-bottom:10px}
.searchbox input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);background:#fff;font:14px 'STIX Two Text','Noto Serif SC',serif;color:#222}
.searchbox input:focus{outline:none;border-color:#000}
.searchbox::before{content:"🔍";position:absolute;left:11px;top:8px;font-size:13px;opacity:.6}
.statbar{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
.statbar b{color:#000}
.tabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.tab{border:1px solid #aaa;background:#fff;color:#444;padding:3px 12px;font-size:12.5px;cursor:pointer;letter-spacing:.5px;font-family:inherit}
.tab:hover{border-color:#000;color:#000}
.tab.active{background:#000;color:#fff;border-color:#000}
.tab .c{opacity:.6;font-size:11px;margin-left:4px}
.tab.active .c{opacity:.8}
.tagcloud{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tagchip{border:1px solid #ccc;background:#fafafa;color:#555;padding:1px 9px;font-size:11px;cursor:pointer;letter-spacing:.3px}
.tagchip:hover{border-color:#000;color:#000}
.tagchip.on{background:#000;color:#fff;border-color:#000}
.tagcloud .clear{border:none;background:none;color:#999;font-size:11px;cursor:pointer;text-decoration:underline;padding:1px 4px}

/* 分类分组（details 折叠） */
.cat{margin:22px 0;border:1px solid var(--line)}
.cat>summary{list-style:none;cursor:pointer;padding:13px 18px;background:var(--soft);display:flex;align-items:center;gap:10px;user-select:none}
.cat>summary::-webkit-details-marker{display:none}
.cat>summary .arrow{font-size:11px;color:#888;transition:transform .15s;display:inline-block;width:12px}
.cat[open]>summary .arrow{transform:rotate(90deg)}
.cat>summary .ico{font-size:16px}
.cat>summary .clabel{font-size:16px;font-weight:700;color:#000;letter-spacing:.5px}
.cat>summary .cdesc{font-size:12px;color:var(--muted);font-style:italic;margin-left:auto;text-align:right}
.cat>summary .ccount{font-size:12px;color:#000;border:1px solid #000;border-radius:10px;padding:0 8px;margin-left:4px}
.cat-body{padding:14px 16px 4px}

.paper-list{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.paper{border:1px solid var(--line);background:#fff;transition:border-color .15s,background .15s}
.paper:hover{border-color:#000;background:#fafaf7}
.paper .head{padding:15px 18px 12px;text-decoration:none;color:inherit;display:block}
.paper .num{display:inline-block;font-size:11px;color:var(--muted);letter-spacing:1.2px;margin-bottom:4px}
.paper .title{font-size:16px;font-weight:700;color:#000;margin:0 0 5px;line-height:1.42}
.paper .authors{font-size:12px;color:var(--muted);margin:0;font-style:italic}
.paper details.sm{border-top:1px dashed var(--line);margin:0 18px}
.paper details.sm>summary{list-style:none;cursor:pointer;font-size:11.5px;color:#888;padding:7px 0;letter-spacing:.5px;user-select:none}
.paper details.sm>summary::-webkit-details-marker{display:none}
.paper details.sm>summary:hover{color:#000}
.paper details.sm[open]>summary{color:#000}
.paper .summary{font-size:13.5px;color:#333;line-height:1.72;padding:0 0 12px}
.tags{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 15px}
.tag{display:inline-block;border:1px solid #aaa;color:#333;padding:1px 8px;font-size:11px;letter-spacing:.4px;cursor:pointer}
.tag:hover{border-color:#000}
.tag.k{background:#000;color:#fff;border-color:#000}
.tag.k:hover{background:#333}

.empty{border:1px dashed var(--line);padding:20px;text-align:center;color:var(--muted);font-size:12.5px;font-style:italic}
.noresult{padding:40px;text-align:center;color:var(--muted);font-style:italic}

footer{margin-top:60px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
footer a{color:#444}
.about{font-size:13px;color:#333;line-height:1.8;margin-top:40px;border-top:1px solid var(--line);padding-top:18px}
.about code{background:#f3f3f3;padding:1px 5px;font-size:12px}
@media(max-width:640px){.wrap{padding:32px 18px 80px}h1{font-size:24px}.cat>summary .cdesc{display:none}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1 id="site-title">Arxiv Paper Reader</h1>
  <p class="tagline" id="site-tagline"></p>
  <p class="meta">
    每篇报告提取原文图、关键公式与实验结果，按“问题 → 方法 → 实验 → 局限 → 总结”重写。
    源码：<a id="repo-link" href="#">GitHub</a>
  </p>
</header>

<div class="toolbar">
  <div class="searchbox"><input id="search" type="text" placeholder="搜索标题 / 摘要 / 标签 / 作者…"></div>
  <div class="statbar" id="statbar"></div>
  <div class="tabs" id="tabs"></div>
  <div class="tagcloud" id="tagcloud"></div>
</div>

<main id="content"></main>

<div class="about">
  每篇报告是独立子目录，结构为 <code>分类/报告slug/index.html + images/</code>。
  风格统一：衬线字体、黑白灰、KaTeX 公式、原文图直接嵌入。GitHub Pages 静态托管，加新报告只需在 <code>papers.js</code> 增一条记录。
</div>

<footer>
  Built with care · Hosted on GitHub Pages · 持续更新中<br>
  © <span id="y"></span> luhan1999
</footer>

</div>

<script src="papers.js"></script>
<script>
(function(){
  var S = window.SITE, P = S.PAPERS, CATS = S.CATEGORIES;
  document.getElementById('site-title').textContent = S.title;
  document.getElementById('site-tagline').textContent = S.tagline;
  document.getElementById('repo-link').href = S.repo;
  document.getElementById('repo-link').textContent = S.repo.replace('https://','');
  document.getElementById('y').textContent = new Date().getFullYear();

  var state = { q:"", cat:"all", tags:[] };

  // ---- 标签全集（按出现频次排序）----
  var tagFreq = {};
  P.forEach(function(p){ (p.tags||[]).forEach(function(t){ tagFreq[t]=(tagFreq[t]||0)+1; }); });
  var allTags = Object.keys(tagFreq).sort(function(a,b){ return tagFreq[b]-tagFreq[a] || a.localeCompare(b); });

  // ---- 分类 Tab ----
  var tabsEl = document.getElementById('tabs');
  function catCount(id){ return P.filter(function(p){return p.category===id;}).length; }
  var tabs = [{id:"all",label:"全部",count:P.length}].concat(CATS.map(function(c){
    return {id:c.id,label:c.icon+" "+c.label,count:catCount(c.id)};
  }));
  tabs.forEach(function(t){
    var b=document.createElement('button'); b.className='tab'+(t.id==='all'?' active':'');
    b.dataset.cat=t.id; b.innerHTML=t.label+'<span class="c">'+t.count+'</span>';
    b.onclick=function(){ state.cat=t.id; document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x.dataset.cat===t.id);}); render(); };
    tabsEl.appendChild(b);
  });

  // ---- 标签云 ----
  var cloudEl = document.getElementById('tagcloud');
  function buildCloud(){
    cloudEl.innerHTML='';
    allTags.forEach(function(t){
      var c=document.createElement('span'); c.className='tagchip'+(state.tags.indexOf(t)>=0?' on':'');
      c.textContent='#'+t;
      c.onclick=function(){ var i=state.tags.indexOf(t); if(i>=0)state.tags.splice(i,1); else state.tags.push(t); buildCloud(); render(); };
      cloudEl.appendChild(c);
    });
    if(state.tags.length){
      var cl=document.createElement('button'); cl.className='clear'; cl.textContent='清除标签('+state.tags.length+')';
      cl.onclick=function(){ state.tags=[]; buildCloud(); render(); };
      cloudEl.appendChild(cl);
    }
  }

  // ---- 搜索 ----
  document.getElementById('search').addEventListener('input',function(e){ state.q=e.target.value.trim().toLowerCase(); render(); });

  function match(p){
    if(state.cat!=='all' && p.category!==state.cat) return false;
    if(state.tags.length && !state.tags.every(function(t){return (p.tags||[]).indexOf(t)>=0;})) return false;
    if(state.q){
      var hay=(p.title+' '+p.summary+' '+(p.authors||'')+' '+(p.tags||[]).join(' ')+' '+(p.source||'')).toLowerCase();
      if(hay.indexOf(state.q)<0) return false;
    }
    return true;
  }

  function fmtDate(d){ return d.replace('-','/'); }

  function paperCard(p){
    var el=document.createElement('div'); el.className='paper';
    var tagsHtml=(p.tags||[]).map(function(t,i){return '<span class="tag'+(i===0?' k':'')+'" data-tag="'+t.replace(/"/g,'')+'">'+t+'</span>';}).join('');
    el.innerHTML =
      '<a class="head" href="'+p.path+'">'+
        '<span class="num">'+fmtDate(p.date)+' · '+(p.source||'')+'</span>'+
        '<h3 class="title">'+p.title+'</h3>'+
        (p.authors?'<p class="authors">'+p.authors+'</p>':'')+
      '</a>'+
      '<details class="sm"><summary>▸ 摘要</summary><div class="summary">'+p.summary+'</div></details>'+
      '<div class="tags">'+tagsHtml+'</div>';
    // 标签点击 = 加入筛选
    el.querySelectorAll('.tag').forEach(function(tg){
      tg.onclick=function(ev){ ev.preventDefault(); var t=tg.dataset.tag;
        if(state.tags.indexOf(t)<0){state.tags.push(t); buildCloud(); render();} };
    });
    return el;
  }

  function render(){
    var content=document.getElementById('content');
    content.innerHTML='';
    var visible=P.filter(match);

    // 统计条
    var byCat=CATS.map(function(c){ return c.label+' '+P.filter(function(p){return p.category===c.id;}).length; }).join(' · ');
    document.getElementById('statbar').innerHTML='共 <b>'+P.length+'</b> 篇 · '+byCat+(visible.length!==P.length?'　|　当前筛出 <b>'+visible.length+'</b> 篇':'');

    if(!visible.length){ content.innerHTML='<div class="noresult">没有匹配的报告 — 试试清空搜索或标签筛选。</div>'; return; }

    // 是否处于“筛选态”（搜索/标签/非全部分类）→ 自动展开所有命中分组
    var filtering = !!(state.q || state.tags.length || state.cat!=='all');

    CATS.forEach(function(c){
      var items=visible.filter(function(p){return p.category===c.id;})
                       .sort(function(a,b){return b.date.localeCompare(a.date);});
      // 全部分类视图下，空分类也显示（带空状态）；筛选态下空分类隐藏
      if(filtering && !items.length) return;

      var det=document.createElement('details'); det.className='cat';
      det.open = filtering ? true : c.defaultOpen;
      var sum=document.createElement('summary');
      sum.innerHTML='<span class="arrow">▶</span><span class="ico">'+c.icon+'</span>'+
        '<span class="clabel">'+c.label+'</span><span class="ccount">'+items.length+'</span>'+
        '<span class="cdesc">'+c.desc+'</span>';
      det.appendChild(sum);
      var body=document.createElement('div'); body.className='cat-body';
      if(!items.length){ body.innerHTML='<div class="empty">该分类暂无报告，敬请期待。</div>'; }
      else { var list=document.createElement('div'); list.className='paper-list';
             items.forEach(function(p){ list.appendChild(paperCard(p)); }); body.appendChild(list); }
      det.appendChild(body);
      content.appendChild(det);
    });

    if(window.renderMathInElement){ try{renderMathInElement(content,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){} }
  }

  buildCloud(); render();
})();
</script>
</body>
</html>
